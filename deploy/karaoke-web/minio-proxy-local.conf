server {
  listen 80;

  # Локальный аналог продакшн-хоста "minio-proxy" (см. deploy/web-server-deploy/deploy/80to8897).
  # На сервере minio-proxy — это nginx НА ХОСТЕ, проксирующий на удалённый MinIO (89.125.103.63) в
  # обход MTU-проблемы Docker bridge. Локально MTU-проблемы нет (karaoke-web и karaoke-storage —
  # соседние контейнеры в одной docker-сети), поэтому этот сайдкар просто проксирует на локальный
  # MinIO по имени контейнера — код в PublicApiController.kt/PublicPlayerController.kt не знает
  # разницы, т.к. всегда ходит на storage.proxy-url + "/minio/karaoke/...".
  location /minio/ {
    proxy_pass http://karaoke-storage:9000/;
    proxy_set_header Host karaoke-storage:9000;
    proxy_buffering off;
  }
}
