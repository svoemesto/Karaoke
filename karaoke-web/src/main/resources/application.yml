server:
  port: 7799

spring:
  thymeleaf:
    check-template-location: true
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    servlet:
      content-type: text/html
    cache: false
  main:
    allow-bean-definition-overriding: true

WORK_IN_CONTAINER: 0
work-in-container: ${WORK_IN_CONTAINER}
work-on-server: ${WORK_ON_SERVER}
db-local-postgres-user: ${DB_LOCAL_POSTGRES_USER}
db-local-postgres-password: ${DB_LOCAL_POSTGRES_PASSWORD}
db-remote-postgres-user: ${DB_SERVER_POSTGRES_USER}
db-remote-postgres-password: ${DB_SERVER_POSTGRES_PASSWORD}

app:
  max-file-size: 100MB
  max-request-size: 100MB

storage:
  key: ${STORAGE_KEY}
  secret: ${STORAGE_SECRET}
  folder: ${STORAGE_FOLDER}
  port-host: ${STORAGE_PORT_HOST}
  port-inside-container: ${STORAGE_PORT_INSIDE_CONTAINER}
  container-name: ${STORAGE_CONTAINER_NAME}
  console:
    port-host: ${STORAGE_CONSOLE_PORT_HOST}
    port-inside-container: ${STORAGE_CONSOLE_PORT_INSIDE_CONTAINER}