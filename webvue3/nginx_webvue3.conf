user  nginx;
worker_processes  1;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;
events {
  worker_connections  1024;
}
http {

  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
  access_log  /var/log/nginx/access.log  main;
  sendfile        on;
  keepalive_timeout  65;

  server {
    listen       7906;
    client_max_body_size 1024m;
    server_name  localhost;

    location / {
      root   /app;
      index  index.html;
      try_files $uri $uri/ /index.html;
    }

    location /apis {
       expires -1;
       add_header Cache-Control 'no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0';
       set $target http://10.0.1.7:8899/apis;
       proxy_pass http://10.0.1.7:8899/apis;
       proxy_set_header X-Forwarded-For-Client $proxy_add_x_forwarded_for;
    }

    # Пред-существующий пробел в конфиге: не было прокси на /api вовсе (только битый /apis с
    # захардкоженным старым IP) — из-за этого локально ЛЮБОЙ вызов /api/* (включая уже
    # существующий раздел «Пользователи», не только новый «Пользователи сайта») отдавал 405
    # Not Allowed от самого nginx (POST на статику через try_files). karaoke-app виден в сети
    # karaokenet по алиасу karaoke-app:8899 (см. DEVELOPMENT.md: "location /api → karaoke-app:8899").
    #
    # proxy_pass указан через переменную (не литералом) — иначе nginx резолвит имя хоста один раз
    # при СТАРТЕ и падает насмерть (emerg: host not found), если контейнер karaoke-app в этот
    # момент ещё не поднят/не зарегистрирован в docker DNS (например, при пересоздании
    # karaoke-app без webvue3, или при гонке порядка запуска). С переменной + resolver имя
    # резолвится лениво, на каждый запрос, так что webvue3 стартует независимо от karaoke-app.
    location /api {
       expires -1;
       add_header Cache-Control 'no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0';
       resolver 127.0.0.11 valid=10s ipv6=off;
       set $karaoke_app_upstream "http://karaoke-app:8899";
       proxy_pass $karaoke_app_upstream/api;
       proxy_set_header X-Forwarded-For-Client $proxy_add_x_forwarded_for;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
      root   /usr/share/nginx/html;
    }
  }
}
