version: "3.9"
services:

  karaoke-app:
    container_name: karaoke-app
    image: svoemestodev/karaoke-app:1
    ports:
      - "8898:8899"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - WORK_ON_SERVER=0
      - WORK_IN_CONTAINER=1
      - STORAGE_FOLDER=${STORAGE_FOLDER}
      - STORAGE_PORT_HOST=${STORAGE_PORT_HOST}
      - STORAGE_PORT_INSIDE_CONTAINER=${STORAGE_PORT_INSIDE_CONTAINER}
      - STORAGE_CONSOLE_PORT_HOST=${STORAGE_CONSOLE_PORT_HOST}
      - STORAGE_CONSOLE_PORT_INSIDE_CONTAINER=${STORAGE_CONSOLE_PORT_INSIDE_CONTAINER}
      - STORAGE_CONTAINER_NAME=${STORAGE_CONTAINER_NAME}
      - STORAGE_KEY=${STORAGE_KEY}
      - STORAGE_SECRET=${STORAGE_SECRET}
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
      - CORS_ALLOWED_ORIGINS=http://localhost:7906,http://127.0.0.1:7906
      - APP_MAX_FILE_SIZE=10MB
      - DB_LOCAL_POSTGRES_USER=${DB_LOCAL_POSTGRES_USER}
      - DB_LOCAL_POSTGRES_PASSWORD=${DB_LOCAL_POSTGRES_PASSWORD}
      - DB_SERVER_POSTGRES_USER=${DB_SERVER_POSTGRES_USER}
      - DB_SERVER_POSTGRES_PASSWORD=${DB_SERVER_POSTGRES_PASSWORD}
      - DISPLAY=${DISPLAY}
      - XAUTHORITY=/.Xauthority
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - SEARXNG_BASE_URL=http://searxng:8080
    volumes:
      - /sm-karaoke/work:/sm-karaoke/work
      - /sm-karaoke/done1:/sm-karaoke/done1
      - /sm-karaoke/done2:/sm-karaoke/done2
      - /sm-karaoke/system:/sm-karaoke/system
      - /sm-karaoke/store:/sm-karaoke/store
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/Karaoke/karaoke-web/src/main/resources/static/tmp:~/Karaoke/karaoke-web/src/main/resources/static/tmp
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ~/.Xauthority:/.Xauthority:rw
      - /etc/localtime:/etc/localtime:ro
    devices:
      - /dev/dri:/dev/dri
    networks:
      - karaokenet # Используем внешнюю сеть
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: ["gpu", "utility", "compute", "video"]
    entrypoint:
      - java
      - -Xmx2g
    command: -jar /app.jar

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "8888:8080"
    volumes:
      - ./searxng-settings:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080/
      - SEARXNG_SECRET=i-love-my-wife-oxana
    restart: unless-stopped
    networks:
      - karaokenet

networks:
  karaokenet:
    external: true # <-- Указываем, что сеть внешняя