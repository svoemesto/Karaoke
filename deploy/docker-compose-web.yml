version: "3.9"
services:

  karaoke-web:
    container_name: karaoke-web
    image: ${DOCKER_REGISTRY}/karaoke-web:${BUILD_VERSION}
    ports:
      - ${WEB_PORT_HOST}:${WEB_PORT_INSIDE_CONTAINER}
    environment:
      - WORK_ON_SERVER=0
      - WORK_IN_CONTAINER=1
      - STORAGE_FOLDER=${STORAGE_FOLDER}
      - STORAGE_PORT_HOST=${STORAGE_PORT_HOST}
      - STORAGE_PORT_INSIDE_CONTAINER=${STORAGE_PORT_INSIDE_CONTAINER}
      - STORAGE_CONSOLE_PORT_HOST=${STORAGE_CONSOLE_PORT_HOST}
      - STORAGE_CONSOLE_PORT_INSIDE_CONTAINER=${STORAGE_CONSOLE_PORT_INSIDE_CONTAINER}
      - STORAGE_CONTAINER_NAME=${STORAGE_CONTAINER_NAME}
      - STORAGE_KEY=${STORAGE_KEY}
      - STORAGE_SECRET=${STORAGE_SECRET}
      - DB_LOCAL_POSTGRES_USER=${DB_LOCAL_POSTGRES_USER}
      - DB_LOCAL_POSTGRES_PASSWORD=${DB_LOCAL_POSTGRES_PASSWORD}
      - DB_SERVER_POSTGRES_USER=${DB_SERVER_POSTGRES_USER}
      - DB_SERVER_POSTGRES_PASSWORD=${DB_SERVER_POSTGRES_PASSWORD}
      # На сервере "minio-proxy" — хостовый nginx (extra_hosts), проксирующий на удалённый MinIO
      # в обход MTU-проблемы. Локально MTU-проблемы нет — karaoke-minio-proxy ниже просто проксирует
      # на локальный MinIO-контейнер (karaoke-storage), сохраняя тот же путь "/minio/karaoke/...",
      # который код (fetchFromMinIO/existsInMinIO) строит одинаково в обоих окружениях.
      - STORAGE_PROXY_URL=http://karaoke-minio-proxy
      # Премиум-фича «Создать минусовку» (StemJob) — application.yml на проде ненадёжен (см. соседний
      # прод-compose), значение должно приходить отсюда напрямую (относится и к локальному запуску
      # через этот compose, для единообразия).
      - STEMJOBS_INTERNAL_SECRET=${STEMJOBS_INTERNAL_SECRET}
#    volumes:
#      - ${WEB_FOLDER_HOST}:${WEB_FOLDER_IN_CONTAINER}
    networks:
      - karaokenet
    depends_on:
      - karaoke-minio-proxy
    entrypoint:
      - java
      - -Dfile.encoding=UTF-8
      - -Djava.security.egd=file:/dev/./urandom
      - -XX:+HeapDumpOnOutOfMemoryError
      - -XX:HeapDumpPath=/dumps
    command: ${APP_JAVA_OPTS} -jar /app.jar
    restart: always

  # Локальный аналог продакшн-хоста "minio-proxy" (см. deploy/karaoke-web/minio-proxy-local.conf) —
  # только для локальной разработки; на продакшн-сервере этот сервис не разворачивается, там
  # "minio-proxy" резолвится через extra_hosts в хостовый nginx (см. web-server-deploy/deploy).
  karaoke-minio-proxy:
    container_name: karaoke-minio-proxy
    image: nginx:stable
    volumes:
      - ./karaoke-web/minio-proxy-local.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      karaokenet:
        aliases:
          - minio-proxy
    restart: always

networks:
  karaokenet:
    external: true # <-- Указываем, что сеть внешняя
