user  nginx;
worker_processes  1;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;
events {
  worker_connections  1024;
}
http {

  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
  access_log  /var/log/nginx/access.log  main;
  sendfile        on;
  keepalive_timeout  65;

  server {
    listen       7907;
    client_max_body_size 1024m;
    server_name  localhost;

    location / {
      root   /app;
      index  index.html;
      try_files $uri $uri/ /index.html;
    }

    # karaoke-web слушает WEB_PORT_HOST/WEB_PORT_INSIDE_CONTAINER (deploy/do.env).
    # Если karaoke-web запущен в том же docker compose проекте/сети — можно заменить
    # "karaoke-web:7799" на адрес из nginx_webvue3.conf (там используется LAN IP хоста).
    location /api/public {
       expires -1;
       add_header Cache-Control 'no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0';
       proxy_pass http://karaoke-web:7799;
       proxy_set_header X-Forwarded-For-Client $proxy_add_x_forwarded_for;
    }

    location /api/storage {
       expires -1;
       add_header Cache-Control 'no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0';
       proxy_pass http://karaoke-web:7799;
       proxy_set_header X-Forwarded-For-Client $proxy_add_x_forwarded_for;
    }

    # /api/public/picture (и другие MinIO-backed эндпоинты karaoke-web) отвечают 302-редиректом на
    # относительный путь /minio/karaoke/..., который браузер запрашивает обратно на ЭТОТ же origin
    # (karaoke-public). На продакшн-сервере эти запросы перехватывает хостовый nginx (location /minio/
    # в 80to8897) РАНЬШЕ, чем они доходят до этого контейнера — там location ниже никогда не
    # срабатывает. Локально (без хостового nginx перед karaoke-public) редирект больше некому
    # перехватить, поэтому проксируем сюда же, на локальный сайдкар karaoke-minio-proxy (алиас
    # "minio-proxy" в docker-compose-web.yml). resolver+variable — тот же приём, что и в
    # nginx_webvue3.conf: если алиас недоступен (как на сервере), nginx не падает при старте
    # ("host not found"), а просто отвечает 502 на конкретный запрос.
    resolver 127.0.0.11 valid=10s ipv6=off;
    location /minio/ {
       set $minio_upstream http://minio-proxy;
       proxy_pass $minio_upstream;
       # Объекты в MinIO отдаются без корректного Content-Type (application/octet-stream) и с
       # X-Content-Type-Options: nosniff — эта комбинация заставляет браузер ПОЛНОСТЬЮ отказаться
       # рендерить <img>, даже если байты — валидный PNG/JPEG (MIME-sniffing заблокирован явно).
       # Снимаем nosniff, чтобы браузер сам определил реальный тип по содержимому — тот же приём,
       # которым объясняется разница "картинка на странице песни есть (генерируется на лету с
       # правильным Content-Type), а превью в закромах нет (отдаются напрямую из MinIO)".
       proxy_hide_header X-Content-Type-Options;
       # MinIO отдаёт ETag/Last-Modified без явного Cache-Control — браузер применяет эвристическое
       # кэширование (RFC 7234) и может ГОДАМИ переиспользовать уже закэшированный (в т.ч. ещё со
       # старым nosniff, до фикса выше) ответ без единого сетевого запроса — тогда серверный фикс
       # просто не долетает до уже посещавшего эту страницу браузера. Явно запрещаем кэш.
       proxy_hide_header Cache-Control;
       proxy_hide_header ETag;
       proxy_hide_header Last-Modified;
       add_header Cache-Control 'no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0';
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
      root   /usr/share/nginx/html;
    }
  }
}
