<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Информация удалена</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css"
          integrity="sha384-B0vP5xmATw1+K9KRQjQERJvTumQW0nPEzvF6L/Z6nronJ3oUOFUFpCjEUQouq2+l" crossorigin="anonymous">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            background: #0d0d1a;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        .removed-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .removed-card {
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border: 1px solid #2d2d5e;
            border-radius: 16px;
            padding: 3rem 3.5rem;
            max-width: 540px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
        }

        .removed-icon {
            font-size: 4rem;
            margin-bottom: 1.25rem;
            display: block;
            line-height: 1;
            filter: grayscale(20%);
        }

        .removed-title {
            color: #e8e8f0;
            font-size: 1.45rem;
            font-weight: 600;
            margin-bottom: 0.6rem;
            line-height: 1.3;
        }

        .removed-subtitle {
            color: #9090b8;
            font-size: 1.05rem;
            margin-bottom: 2rem;
        }

        .removed-hint {
            color: #5a5a80;
            font-size: 0.82rem;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        .btn-home {
            background: #3a3a6e;
            border: 1px solid #5a5a9e;
            color: #c8c8f0;
            border-radius: 8px;
            padding: 0.55rem 1.8rem;
            font-size: 0.95rem;
            text-decoration: none;
            transition: background 0.2s, border-color 0.2s;
            display: inline-block;
        }

        .btn-home:hover {
            background: #4a4a8e;
            border-color: #7a7abe;
            color: #fff;
            text-decoration: none;
        }

        .removed-divider {
            border: none;
            border-top: 1px solid #2a2a4e;
            margin: 1.5rem 0;
        }
    </style>
</head>
<body>
    <div class="removed-wrapper">
        <div class="removed-card">
            <span class="removed-icon">🔒</span>
            <div class="removed-title">Информация о произведении удалена</div>
            <div class="removed-subtitle">по требованию правообладателя</div>
            <hr class="removed-divider">
            <div class="removed-hint">
                Страница недоступна в соответствии с обращением<br>
                об авторских правах. Если вы считаете, что это<br>
                произошло по ошибке — свяжитесь с нами.
            </div>
            <a href="/" class="btn-home">← На главную</a>
        </div>
    </div>
</body>
</html>
