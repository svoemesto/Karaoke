user  nginx;
worker_processes  1;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;
events {
  worker_connections  1024;
}
http {

  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
  access_log  /var/log/nginx/access.log  main;
  sendfile        on;
  keepalive_timeout  65;

  server {
    listen       7907;
    client_max_body_size 1024m;
    server_name  localhost;

    location / {
      root   /app;
      index  index.html;
      try_files $uri $uri/ /index.html;
    }

    # karaoke-web слушает WEB_PORT_HOST/WEB_PORT_INSIDE_CONTAINER (deploy/do.env).
    # Если karaoke-web запущен в том же docker compose проекте/сети — можно заменить
    # "karaoke-web:7799" на адрес из nginx_webvue3.conf (там используется LAN IP хоста).
    location /api/public {
       expires -1;
       add_header Cache-Control 'no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0';
       proxy_pass http://karaoke-web:7799;
       proxy_set_header X-Forwarded-For-Client $proxy_add_x_forwarded_for;
    }

    location /api/storage {
       expires -1;
       add_header Cache-Control 'no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0';
       proxy_pass http://karaoke-web:7799;
       proxy_set_header X-Forwarded-For-Client $proxy_add_x_forwarded_for;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
      root   /usr/share/nginx/html;
    }
  }
}
