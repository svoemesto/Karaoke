server:
  port: 7799

spring:
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB
  thymeleaf:
    check-template-location: true
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    servlet:
      content-type: text/html
    cache: false
  main:
    allow-bean-definition-overriding: true

WORK_IN_CONTAINER: 0
work-in-container: ${WORK_IN_CONTAINER}
work-on-server: ${WORK_ON_SERVER}
db-local-postgres-user: ${DB_LOCAL_POSTGRES_USER}
db-local-postgres-password: ${DB_LOCAL_POSTGRES_PASSWORD}
db-remote-postgres-user: ${DB_SERVER_POSTGRES_USER}
db-remote-postgres-password: ${DB_SERVER_POSTGRES_PASSWORD}

app:
  max-file-size: 100MB
  max-request-size: 100MB
  # Базовый URL публичного сайта (karaoke-public SPA) — нужен для return_url редиректа ЮKassa после
  # оплаты (PublicSubscriptionController). Локально бьёт на дев-сервер Vite по умолчанию.
  public-site-url: ${PUBLIC_SITE_URL:https://sm-karaoke.ru}

captcha:
  # На проде указывает на хостовый nginx-прокси (обход MTU black-hole для внешних HTTPS-вызовов,
  # см. deploy/web-server-deploy/deploy/80to8897 location /smartcaptcha/). Локально MTU-проблемы нет —
  # дефолт бьёт напрямую в Yandex.
  proxy-url: ${CAPTCHA_PROXY_URL:https://smartcaptcha.yandexcloud.net}

yookassa:
  # Тот же MTU-обход, см. 80to8897 location /yookassa/. shop-id/secret-key пустые по умолчанию —
  # PaymentService должен явно проверять их наличие и не пытаться создавать платежи без ключей
  # (самозанятость/магазин ЮKassa ещё не оформлены — см. план монетизации, Prerequisites).
  proxy-url: ${YOOKASSA_API_URL:https://api.yookassa.ru}
  shop-id: ${YOOKASSA_SHOP_ID:}
  secret-key: ${YOOKASSA_SECRET_KEY:}

storage:
  key: ${STORAGE_KEY}
  secret: ${STORAGE_SECRET}
  folder: ${STORAGE_FOLDER}
  port-host: ${STORAGE_PORT_HOST}
  port-inside-container: ${STORAGE_PORT_INSIDE_CONTAINER}
  container-name: ${STORAGE_CONTAINER_NAME}
  console:
    port-host: ${STORAGE_CONSOLE_PORT_HOST}
    port-inside-container: ${STORAGE_CONSOLE_PORT_INSIDE_CONTAINER}
  proxy-url: ${STORAGE_PROXY_URL:http://minio-proxy}