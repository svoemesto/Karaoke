version: "3.9"
services:

  karaoke-web:
    container_name: karaoke-web
    image: ${DOCKER_REGISTRY}/karaoke-web:1
    ports:
      - ${WEB_PORT_HOST}:${WEB_PORT_INSIDE_CONTAINER}
    environment:
      - WORK_ON_SERVER=1
      - WORK_IN_CONTAINER=1
      - STORAGE_FOLDER=${STORAGE_FOLDER}
      - STORAGE_PORT_HOST=${STORAGE_PORT_HOST}
      - STORAGE_PORT_INSIDE_CONTAINER=${STORAGE_PORT_INSIDE_CONTAINER}
      - STORAGE_CONSOLE_PORT_HOST=${STORAGE_CONSOLE_PORT_HOST}
      - STORAGE_CONSOLE_PORT_INSIDE_CONTAINER=${STORAGE_CONSOLE_PORT_INSIDE_CONTAINER}
      - STORAGE_CONTAINER_NAME=${STORAGE_CONTAINER_NAME}
      - STORAGE_KEY=${STORAGE_KEY}
      - STORAGE_SECRET=${STORAGE_SECRET}
      - DB_LOCAL_POSTGRES_USER=${DB_LOCAL_POSTGRES_USER}
      - DB_LOCAL_POSTGRES_PASSWORD=${DB_LOCAL_POSTGRES_PASSWORD}
      - DB_SERVER_POSTGRES_USER=${DB_SERVER_POSTGRES_USER}
      - DB_SERVER_POSTGRES_PASSWORD=${DB_SERVER_POSTGRES_PASSWORD}
      # Обход MTU black-hole для внешних HTTPS-вызовов (см. 80to8897 location /smartcaptcha/) —
      # тот же приём, что STORAGE_PROXY_URL для MinIO.
      - CAPTCHA_PROXY_URL=http://minio-proxy/smartcaptcha
      # Тот же приём для ЮKassa API (80to8897 location /yookassa/). shop-id/secret-key — реальные
      # значения из do.env на сервере (НЕ коммитить сюда, см. DEVELOPMENT.md про секреты в do.sh/do.env).
      - YOOKASSA_API_URL=http://minio-proxy/yookassa
      - YOOKASSA_SHOP_ID=${YOOKASSA_SHOP_ID}
      - YOOKASSA_SECRET_KEY=${YOOKASSA_SECRET_KEY}
      # Прокси к MinIO через хостовый nginx (fetchFromMinIO/existsInMinIO в PublicApiController/
      # PublicPlayerController). @Value("${storage.proxy-url}") требует это значение; application.yml
      # в jar не упаковывается, поэтому property приходит только отсюда (иначе karaoke-web не стартует).
      - STORAGE_PROXY_URL=http://minio-proxy
      # Премиум-фича «Создать минусовку» (StemJob) — общий секрет заголовка X-Internal-Secret с
      # karaoke-app (см. docs/stemjobs-admin-guide.md). Реальное значение — из do.env на сервере
      # (НЕ коммитить сюда, тот же приём, что YOOKASSA_SHOP_ID/SECRET_KEY выше).
      - STEMJOBS_INTERNAL_SECRET=${STEMJOBS_INTERNAL_SECRET}
    volumes:
      - ${WEB_FOLDER_HOST}:${WEB_FOLDER_IN_CONTAINER}
    extra_hosts:
      - "minio-proxy:host-gateway"
    networks:
      - karaokenet
    entrypoint:
      - java
      - -Dfile.encoding=UTF-8
      - -Djava.security.egd=file:/dev/./urandom
      - -XX:+HeapDumpOnOutOfMemoryError
      - -XX:HeapDumpPath=/dumps
    command: ${APP_JAVA_OPTS} -jar /app.jar
    restart: always

networks:
  karaokenet:
    external: true
    name: deploy_karaokenet
